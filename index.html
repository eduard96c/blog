<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>Blog</h1>
    </header>
    <section id="main">
      <div id="content" class="content-container"></div>
      <div id="side-menu">
        <section id="subscribe">
          <h3>Subscribe to Newsletter</h3>
          <form id="subscribe-form" method="post" action="#">
            <input
              type="text"
              id="subscribe-email"
              placeholder="Your Email Here"
            />
            <input
              type="text"
              id="subscribe-name"
              placeholder="Your Name Here"
            />
            <input type="submit" id="submit-subscribe" />
          </form>
        </section>
        <section id="categories">
          <h3>Categories</h3>
          <ul id="categories-list" class="side-menu-list">
            <li>
              <a href="#">Category 1</a>
            </li>
            <hr />
            <li>
              <a href="#">Category 2</a>
            </li>
            <hr />
            <li>
              <a href="#">Category 3</a>
            </li>
            <hr />
            <li>
              <a href="#">Category 4</a>
            </li>
          </ul>
        </section>
      </div>
    </section>
  </body>
</html>
